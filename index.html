<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JOYFIT24 9周年チャレンジ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #d0122d;
      --red-deep: #8e0a1c;
      --ink: #121212;
      --mute: #6b6562;
      --line: rgba(18, 18, 18, .12);
      --paper: #fff;
      --board: #0c0c0d;
      --gold: #d4a017;
      --ok: #0f7a5a;
      --shadow: 0 18px 40px rgba(0, 0, 0, .28);
      --sans: "Noto Sans JP", "Hiragino Sans", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: var(--sans);
    }

    button, input, select {
      font: inherit;
    }

    button { cursor: pointer; }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      min-height: 100svh;
      margin: 0 auto;
      overflow-x: hidden;
      background: #fff;
    }

    .view { display: none; }
    .view.active { display: block; }



    /* ===== AUTH ===== */
    .authHero {
      position: relative;
      min-height: 100dvh;
      min-height: 100svh;
      overflow: hidden;
      color: var(--ink);
      background: #fff;
    }

    .authInner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 18px;
      box-sizing: border-box;
      min-height: 100dvh;
      min-height: 100svh;
      padding: calc(28px + env(safe-area-inset-top, 0px)) 20px calc(20px + env(safe-area-inset-bottom, 0px));
    }

    .authStack {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .brandBlock {
      display: grid;
      gap: 4px;
      color: var(--ink);
      padding: 0;
    }

    .brandBlock .store {
      margin: 0;
      font-size: clamp(30px, 8.5vw, 38px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: .04em;
    }

    .brandBlock .store .glow {
      display: inline-block;
      color: var(--ink);
      animation: softFade 2s ease-in-out infinite alternate;
    }

    .brandBlock .eventTitle {
      margin: 0;
      font-size: clamp(20px, 5.6vw, 24px);
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: .06em;
      color: var(--red);
      animation: softFade 2s ease-in-out .15s infinite alternate;
    }

    @keyframes softFade {
      from { opacity: .72; }
      to { opacity: 1; }
    }

    @keyframes pulseLine {
      0%, 100% { transform: scaleX(.4); opacity: .45; }
      50% { transform: scaleX(1); opacity: 1; }
    }

    .promoBoard {
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      position: relative;
    }

    .promoBoard p {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
      letter-spacing: .01em;
      color: var(--ink);
    }

    .promoBoard .accent {
      color: var(--red);
      font-weight: 900;
      animation: softFade 2s ease-in-out .1s infinite alternate;
    }

    .loginBoard {
      display: grid;
      gap: 12px;
      margin-top: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .loginBoard label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .fieldHint {
      color: var(--mute);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: 0;
    }

    .loginBoard input {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 0;
      border-bottom: 2px solid rgba(18, 18, 18, .28);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      font-size: 17px;
      font-weight: 700;
      outline: none;
      transition: border-color .2s ease;
    }

    .loginBoard input::placeholder { color: rgba(18, 18, 18, .32); }

    .loginBoard input:focus {
      border-bottom-color: var(--red);
      background: #fff;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 12px 14px;
      border: 0;
      border-bottom: 2px solid rgba(18, 18, 18, .28);
      border-radius: 0;
      background: #f7f5f4;
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
      outline: none;
      transition: border-color .2s ease, background .2s ease;
    }

    input::placeholder { color: rgba(18, 18, 18, .32); }

    input:focus {
      border-bottom-color: var(--red);
      background: #fff;
    }

    .primaryButton {
      width: 100%;
      min-height: 52px;
      margin-top: 2px;
      border: 0;
      border-radius: 2px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .12em;
      background: linear-gradient(180deg, #e21834, #b10e24);
      box-shadow: 0 8px 0 #6f0816;
      transition: transform .14s ease, box-shadow .14s ease, filter .14s ease;
    }

    .primaryButton:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #6f0816;
    }

    .primaryButton:disabled {
      cursor: wait;
      filter: saturate(.75) brightness(.9);
    }

    .appView .primaryButton,
    .entryBoard .primaryButton {
      color: #fff;
    }

    .message {
      display: none;
      padding: 12px 0 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
    }

    .message.show { display: block; }
    .message.ok { color: var(--ok); }
    .message.err { color: var(--red-deep); }

    .appView .message.ok {
      color: var(--ok);
      border-top: 1px solid rgba(15, 122, 90, .25);
    }

    .appView .message.err {
      color: var(--red-deep);
      border-top: 1px solid rgba(208, 18, 45, .2);
    }

    /* ===== APP / BOARD ===== */
    .shellHeader {
      position: relative;
      overflow: hidden;
      padding: 18px 18px 16px;
      color: var(--ink);
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .headerTop,
    .eventBoard,
    .tabs,
    .section {
      position: relative;
      z-index: 1;
    }

    .headerTop {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .headerBrand {
      min-width: 0;
    }

    .headerBrand .eyebrow {
      display: block;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .06em;
      line-height: 1.2;
      color: var(--ink);
    }

    .headerBrand .eyebrow .glow {
      display: inline-block;
      color: var(--ink);
      animation: softFade 2s ease-in-out infinite alternate;
    }

    .headerBrand .eventTitle {
      display: block;
      margin-top: 2px;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--red);
      animation: softFade 2s ease-in-out .15s infinite alternate;
    }

    .headerUser {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--mute);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .headerUser #accountName {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 900;
      color: var(--ink);
    }

    .logout {
      flex: none;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
    }

    .eventBoard {
      margin-top: 14px;
      display: grid;
      gap: 4px;
    }

    .eventMeta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      color: var(--mute);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
    }

    .eventBoard strong {
      display: block;
      font-size: clamp(32px, 9vw, 40px);
      line-height: 1.1;
      letter-spacing: .04em;
      font-weight: 900;
      color: var(--ink);
    }

    .eventBoard .period {
      color: var(--mute);
      font-size: 12px;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .tabButton {
      min-height: 48px;
      border: 0;
      border-bottom: 3px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--mute);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .tabButton.active {
      color: var(--ink);
      border-bottom-color: var(--red);
      background: #fff;
    }

    .section {
      display: none;
      padding: 18px 18px 28px;
      background: #fff;
    }

    .section.active {
      display: block;
      animation: panelIn .35s ease both;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .entryBoard,
    .rankBoard {
      display: grid;
      gap: 18px;
    }

    .sectionHead {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }

    .sectionHead h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .14em;
    }

    .sectionHead span {
      color: var(--mute);
      font-size: 12px;
      font-weight: 700;
    }

    .scoreStage {
      display: grid;
      gap: 0;
      padding: 18px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .scoreTap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 10px;
      width: 100%;
      cursor: text;
    }

    .scoreTap #guideEvent {
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }

    .scoreTap input[name="score"] {
      width: 2.4em;
      min-height: 0;
      padding: 0;
      border: 0;
      border-bottom: 2px solid var(--ink);
      border-radius: 0;
      background: transparent;
      color: var(--red);
      font-size: 42px;
      font-weight: 900;
      letter-spacing: .04em;
      text-align: center;
      outline: none;
    }

    .scoreTap input[name="score"]::placeholder {
      color: rgba(18, 18, 18, .22);
      font-size: 36px;
    }

    .scoreTap input[name="score"]:focus {
      border-bottom-color: var(--red);
      background: transparent;
      box-shadow: none;
    }

    .scoreTap #unitBadge {
      font-size: 18px;
      font-weight: 900;
      color: var(--ink);
      white-space: nowrap;
    }

    .formGrid {
      display: grid;
      gap: 14px;
    }

    .appView label,
    .entryBoard label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
    }



    .ranking {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--line);
    }

    .rankItem {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      animation: rankIn .4s ease both;
    }

    .rankItem:nth-child(1) { animation-delay: .02s; }
    .rankItem:nth-child(2) { animation-delay: .05s; }
    .rankItem:nth-child(3) { animation-delay: .08s; }
    .rankItem:nth-child(4) { animation-delay: .11s; }
    .rankItem:nth-child(5) { animation-delay: .14s; }

    @keyframes rankIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: none; }
    }

    .rankItem:nth-child(1) .place {
      background: var(--gold);
      color: #111;
    }

    .rankItem:nth-child(1) .score {
      color: var(--ink);
    }

    .place {
      font-weight: 900;
      display: grid;
      place-items: center;
      width: 34px;
      aspect-ratio: 1;
      border-radius: 0;
      background: var(--board);
      color: #fff;
      font-size: 18px;
      letter-spacing: .02em;
    }

    .name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 900;
    }

    .sub {
      display: block;
      margin-top: 3px;
      color: var(--mute);
      font-size: 11px;
      font-weight: 500;
    }

    .score {
      color: var(--red);
      font-weight: 900;
      font-size: 24px;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .weeks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .weekChip {
      min-height: 52px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
    }

    .weekChip.active {
      border-color: var(--ink);
      background: var(--board);
      color: #fff;
    }

    .rankBoard + .rankBoard {
      margin-top: 28px;
      padding-top: 8px;
    }

    /* ===== LOADING ===== */
    .loadingOverlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(255, 255, 255, .88);
    }

    .loadingOverlay.show { display: grid; }

    .loadingPanel {
      width: min(100%, 240px);
      padding: 28px 18px;
      background: #fff;
      color: var(--ink);
      text-align: center;
    }

    .loaderRing {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border: 3px solid rgba(18, 18, 18, .12);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loadingPanel strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--mute);
    }

    .loadingPanel p,
    .progressTrack,
    .progressBar,
    .progressText {
      display: none;
    }

    @media (max-width: 380px) {
      .authInner { padding: 22px 16px 16px; gap: 14px; }
      .brandBlock .store { font-size: 28px; }
      .brandBlock .eventTitle { font-size: 18px; }
      .promoBoard p { font-size: 13px; line-height: 1.5; }
      .loginBoard { gap: 10px; }
      .eventBoard strong { font-size: 40px; }
      .scoreTap input[name="score"] { font-size: 36px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="view active" id="authView">
      <div class="authHero">
        <div class="authInner" id="authInner">
          <div class="brandBlock">
            <p class="store"><span class="glow">JOYFIT24 経堂</span></p>
            <p class="eventTitle">9周年イベント</p>
          </div>

          <div class="authStack">
            <div class="promoBoard" aria-label="チャレンジ案内">
              <p>1週間で最大3回チャレンジ！<br>参加するほど<span class="accent">くじのチャンスUP！</span></p>
            </div>

            <form class="loginBoard" id="loginForm">
              <label>
                ニックネーム
                <input name="nickname" autocomplete="nickname" maxlength="16" placeholder="例：タロウ" required>
              </label>
              <label>
                4桁パスワード
                <input name="pin" autocomplete="current-password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="例：1234" required>
              </label>
              <button class="primaryButton" type="submit" id="loginButton">ログイン</button>
              <div class="message" id="authMessage"></div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <section class="view appView" id="appView">
      <header class="shellHeader">
        <div class="headerTop">
          <div class="headerBrand">
            <span class="eyebrow"><span class="glow">JOYFIT24 経堂</span></span>
            <b class="eventTitle">9周年イベント</b>
          </div>
          <button class="logout" type="button" id="logoutButton">ログアウト</button>
        </div>
        <div class="headerUser">
          <span id="accountName">ゲスト</span>
          <span id="accountMeta">会員</span>
        </div>

        <div class="eventBoard">
          <div class="eventMeta">
            <span id="weekNo">Week 1</span>
          </div>
          <strong id="currentEvent">握力測定</strong>
          <div class="period" id="currentPeriod">8/3(月) - 8/9(日)</div>
        </div>
      </header>

      <nav class="tabs" aria-label="表示切替">
        <button class="tabButton active" type="button" data-tab="entryPanel">記録する</button>
        <button class="tabButton" type="button" data-tab="rankingPanel">ランキング</button>
      </nav>

      <section class="section active" id="entryPanel">
        <div class="entryBoard">
          <form class="formGrid" id="entryForm">
            <div class="scoreStage">
              <label class="scoreTap" for="scoreInput">
                <span id="guideEvent">握力測定</span>
                <input id="scoreInput" name="score" inputmode="numeric" pattern="[0-9]{1,2}" maxlength="2" placeholder="--" required>
                <span id="unitBadge">kg</span>
              </label>
            </div>
            <button class="primaryButton" type="submit">記録を送信する</button>
            <div class="message" id="entryMessage"></div>
          </form>
        </div>
      </section>

      <section class="section" id="rankingPanel">
        <div class="rankBoard">
          <div class="sectionHead">
            <h2>THIS WEEK</h2>
            <span id="unitLabel">合計 kg</span>
          </div>
          <ol class="ranking" id="rankingList"></ol>
        </div>

        <div class="rankBoard">
          <div class="sectionHead">
            <h2>PAST WEEKS</h2>
            <span>種目別</span>
          </div>
          <div class="weeks" id="weekChips"></div>
          <ol class="ranking" id="historyList"></ol>
        </div>
      </section>
    </section>

    <div class="loadingOverlay" id="loadingOverlay" aria-live="polite" aria-hidden="true">
      <div class="loadingPanel">
        <div class="loaderRing" aria-hidden="true"></div>
        <strong id="loadingTitle">読み込み中</strong>
      </div>
    </div>
  </main>

  <script>
    const CONFIG = {
      gasEndpoint: "https://script.google.com/macros/s/AKfycbwHCmikLDfBN25bLcEkaLP6RlGyuf7Z6B64hGB0BJGcLQjxwiysATZ6qSdAZNl5h0m1RQ/exec",
      testWeekOverride: 1
    };

    const weeks = [
      { week: 1, event: "握力測定", unit: "kg", start: "2026-08-03", end: "2026-08-09", higherIsBetter: true },
      { week: 2, event: "前屈", unit: "cm", start: "2026-08-10", end: "2026-08-16", higherIsBetter: true },
      { week: 3, event: "プランク", unit: "秒", start: "2026-08-17", end: "2026-08-23", higherIsBetter: true },
      { week: 4, event: "腕立て伏せ", unit: "回", start: "2026-08-24", end: "2026-08-30", higherIsBetter: true }
    ];

    const state = {
      selectedWeek: getCurrentWeek().week,
      session: readSession(),
      records: [],
      rankings: {}
    };

    function getCurrentWeek() {
      if (CONFIG.testWeekOverride) {
        return weeks.find(w => w.week === CONFIG.testWeekOverride) || weeks[0];
      }
      const today = new Date();
      const active = weeks.find(w => today >= new Date(`${w.start}T00:00:00+09:00`) && today <= new Date(`${w.end}T23:59:59+09:00`));
      if (active) return active;
      if (today < new Date(`${weeks[0].start}T00:00:00+09:00`)) return weeks[0];
      return weeks[weeks.length - 1];
    }

    function formatPeriod(w) {
      const s = new Date(`${w.start}T00:00:00+09:00`);
      const e = new Date(`${w.end}T00:00:00+09:00`);
      const day = ["日", "月", "火", "水", "木", "金", "土"];
      return `${s.getMonth() + 1}/${s.getDate()}(${day[s.getDay()]}) - ${e.getMonth() + 1}/${e.getDate()}(${day[e.getDay()]})`;
    }

    function render() {
      const loggedIn = Boolean(state.session && state.session.token);
      document.getElementById("authView").classList.toggle("active", !loggedIn);
      document.getElementById("appView").classList.toggle("active", loggedIn);
      if (!loggedIn) return;

      const current = getCurrentWeek();
      document.getElementById("accountName").textContent = state.session.nickname || "ゲスト";
      document.getElementById("accountMeta").textContent = state.session.division === "staff" ? "スタッフ" : "会員";
      document.getElementById("weekNo").textContent = `WEEK ${current.week}`;
      document.getElementById("currentEvent").textContent = current.event;
      document.getElementById("currentPeriod").textContent = formatPeriod(current);
      document.getElementById("guideEvent").textContent = current.event;
      document.getElementById("unitBadge").textContent = current.unit;
      document.getElementById("unitLabel").textContent = `合計 ${current.unit}`;
      applyScoreInputRules();
      renderRanking("rankingList", current.week);
      renderWeekChips();
      renderRanking("historyList", state.selectedWeek);
    }

    function renderRanking(target, weekNo) {
      const list = document.getElementById(target);
      const w = weeks.find(item => item.week === weekNo);
      const rows = state.rankings[String(weekNo)] || [];
      list.innerHTML = "";
      if (!rows.length) {
        list.innerHTML = `<li class="rankItem"><div class="place">-</div><div class="name">まだ記録がありません<span class="sub">最初の記録をお待ちしています</span></div><div class="score">0 ${w.unit}</div></li>`;
        return;
      }
      rows.forEach(row => {
        const li = document.createElement("li");
        li.className = "rankItem";
        li.innerHTML = `
          <div class="place">${row.rank}</div>
          <div class="name">${escapeHtml(row.displayName)}${row.division === "staff" ? " STAFF" : ""}<span class="sub">${row.attempts}回記録</span></div>
          <div class="score">${formatScore(row.total)} ${w.unit}</div>
        `;
        list.appendChild(li);
      });
    }

    function renderWeekChips() {
      const box = document.getElementById("weekChips");
      box.innerHTML = "";
      weeks.forEach(w => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `weekChip ${w.week === state.selectedWeek ? "active" : ""}`;
        button.textContent = `W${w.week} ${w.event}`;
        button.addEventListener("click", () => {
          state.selectedWeek = w.week;
          render();
        });
        box.appendChild(button);
      });
    }

    async function loadData(options = {}) {
      const silent = Boolean(options.silent);
      try {
        const data = await api({ action: "list" });
        if (data.ok) {
          state.records = data.records || [];
          state.rankings = data.rankings || {};
        }
      } catch (error) {
        throw error;
      } finally {
        render();
      }
    }

    async function login(nickname, pin) {
      const cleanNickname = String(nickname || "").trim().slice(0, 16);
      const cleanPin = String(pin || "").trim();
      if (!cleanNickname) return { ok: false, message: "ニックネームを入力してください。" };
      if (!/^[0-9]{4}$/.test(cleanPin)) return { ok: false, message: "4桁パスワードを入力してください。" };
      const expires = new Date(Date.now() + 1000 * 60 * 60 * 24 * 30).toISOString();
      state.session = {
        token: "local",
        participantId: "",
        nickname: cleanNickname,
        pin: cleanPin,
        division: "member",
        expiresAt: expires
      };
      localStorage.setItem("joyfitSession", JSON.stringify(state.session));
      return { ok: true, session: state.session };
    }

    async function submitRecord(payload) {
      const body = {
        ...payload,
        nickname: state.session.nickname,
        pin: state.session.pin
      };
      return api({ action: "submit", token: state.session.token || "", payload: JSON.stringify(body) });
    }

    function apiOnce(params) {
      return new Promise((resolve, reject) => {
        const callbackName = `joyfitCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const search = new URLSearchParams({ ...params, callback: callbackName });
        const timeoutId = window.setTimeout(() => {
          reject(new Error("request timeout"));
          script.remove();
          delete window[callbackName];
        }, 35000);
        window[callbackName] = data => {
          window.clearTimeout(timeoutId);
          resolve(data);
          script.remove();
          delete window[callbackName];
        };
        script.onerror = () => {
          window.clearTimeout(timeoutId);
          reject(new Error("request failed"));
          script.remove();
          delete window[callbackName];
        };
        script.src = `${CONFIG.gasEndpoint}?${search.toString()}`;
        document.body.appendChild(script);
      });
    }

    async function api(params, retries = 1) {
      let lastError;
      for (let i = 0; i <= retries; i += 1) {
        try {
          return await apiOnce(params);
        } catch (error) {
          lastError = error;
          if (i < retries) await new Promise(r => window.setTimeout(r, 700));
        }
      }
      throw lastError;
    }

    document.querySelectorAll(".tabButton").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tabButton").forEach(b => b.classList.toggle("active", b === button));
        document.querySelectorAll(".section").forEach(p => p.classList.toggle("active", p.id === button.dataset.tab));
      });
    });

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const button = document.getElementById("loginButton");
      showMessage("authMessage", "", true);
      button.disabled = true;
      setBusyLoading(true);
      try {
        const data = await login(
          String(form.get("nickname") || "").trim(),
          String(form.get("pin") || "").trim()
        );
        if (!data.ok) {
          setBusyLoading(false);
          showMessage("authMessage", data.message || "ログインできませんでした。", false);
          return;
        }

        render();
        applyScoreInputRules();
        event.currentTarget.reset();
        try {
          await loadData({ silent: true });
        } catch (_) {
          render();
        }
        setBusyLoading(false);
      } catch (error) {
        setBusyLoading(false);
        if (state.session && state.session.token) {
          render();
          applyScoreInputRules();
        } else {
          showMessage("authMessage", "ログインできませんでした。", false);
        }
      } finally {
        button.disabled = false;
      }
    });

    document.getElementById("scoreInput").addEventListener("input", event => {
      const current = getCurrentWeek();
      if (current.week !== 1) return;
      event.currentTarget.value = event.currentTarget.value.replace(/\D/g, "").slice(0, 2);
    });

    document.getElementById("entryForm").addEventListener("submit", async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const current = getCurrentWeek();
      const button = event.currentTarget.querySelector('button[type="submit"]');
      const raw = String(form.get("score") || "").trim();
      const score = Number(raw);
      showMessage("entryMessage", "", true);

      if (current.week === 1) {
        if (!/^[0-9]{1,2}$/.test(raw) || score < 1 || score > 99) {
          showMessage("entryMessage", "1〜99の数字で入力してください。", false);
          return;
        }
      } else if (!Number.isFinite(score)) {
        showMessage("entryMessage", "数字で入力してください。", false);
        return;
      }

      const payload = {
        week: current.week,
        event: current.event,
        score,
        unit: current.unit,
        inputBy: "self"
      };

      button.disabled = true;
      setBusyLoading(true);
      try {
        const result = await submitRecord(payload);
        if (!result.ok) {
          setBusyLoading(false);
          showMessage("entryMessage", result.message || "送信できませんでした。", false);
          return;
        }
        event.currentTarget.reset();
        applyScoreInputRules();
        try { await loadData({ silent: true }); } catch (_) {}
        setBusyLoading(false);
      } catch (error) {
        try { await loadData({ silent: true }); } catch (_) {}
        setBusyLoading(false);
      } finally {
        button.disabled = false;
      }
    });

    document.getElementById("logoutButton").addEventListener("click", () => {
      localStorage.removeItem("joyfitSession");
      state.session = null;
      render();
    });

    function readSession() {
      try { return JSON.parse(localStorage.getItem("joyfitSession") || "null"); }
      catch { return null; }
    }

    function showMessage(id, text, ok) {
      const el = document.getElementById(id);
      if (!text) {
        el.textContent = "";
        el.className = "message";
        return;
      }
      el.textContent = text;
      el.className = `message show ${ok ? "ok" : "err"}`;
    }

    function setBusyLoading(active) {
      const overlay = document.getElementById("loadingOverlay");
      if (active) {
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
        return;
      }
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
    }

    function applyScoreInputRules() {
      const input = document.getElementById("scoreInput");
      if (!input) return;
      const current = getCurrentWeek();
      if (current.week === 1) {
        input.inputMode = "numeric";
        input.maxLength = 2;
        input.pattern = "[0-9]{1,2}";
        input.placeholder = "--";
        input.removeAttribute("step");
      } else {
        input.inputMode = "decimal";
        input.maxLength = 5;
        input.pattern = "[0-9.]*";
        input.placeholder = "--";
      }
    }

    function formatScore(value) {
      return Number.isInteger(Number(value)) ? String(value) : Number(value).toFixed(1);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[s]));
    }

    render();
    applyScoreInputRules();
    if (state.session) {
      loadData({ silent: true }).catch(() => {});
    }
  </script>
</body>
</html>
