<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JOYFIT24 9周年チャレンジ</title>
  <style>
    :root {
      --red: #d70f16;
      --deep: #79060a;
      --black: #101010;
      --ink: #222;
      --gold: #f7c948;
      --paper: #fffaf5;
      --line: #ead8d8;
      --soft: #fff1ef;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #fff, #f3e4df);
      letter-spacing: 0;
    }
    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: 0 0 42px rgba(70, 10, 10, .18);
    }
    .hero {
      position: relative;
      min-height: 360px;
      color: #fff;
      overflow: hidden;
      background: var(--black);
    }
    .hero img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.04), rgba(112,0,5,.9));
    }
    .heroText {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 1;
      text-shadow: 0 4px 14px rgba(0,0,0,.6);
    }
    .kicker {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.94);
      color: var(--deep);
      font-size: 12px;
      font-weight: 900;
    }
    h1 {
      margin: 10px 0 7px;
      font-size: clamp(34px, 11vw, 50px);
      line-height: .92;
      font-weight: 1000;
    }
    .hero p {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.45;
    }
    .section { padding: 18px; }
    .weekPanel {
      margin-top: -8px;
      position: relative;
      z-index: 2;
      overflow: hidden;
      background: #fff;
      border: 3px solid var(--red);
      border-radius: 8px;
      box-shadow: 0 12px 26px rgba(126, 13, 13, .18);
    }
    .weekHead {
      display: grid;
      grid-template-columns: 76px 1fr;
      background: var(--red);
      color: #fff;
    }
    .weekNo {
      display: grid;
      place-items: center;
      min-height: 74px;
      background: var(--black);
      font-size: 34px;
      font-weight: 1000;
    }
    .weekInfo { padding: 12px 14px; }
    .weekInfo strong {
      display: block;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 1000;
    }
    .weekInfo span {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      font-weight: 800;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .stat {
      padding: 10px 8px 12px;
      text-align: center;
      border-right: 1px solid var(--line);
    }
    .stat:last-child { border-right: 0; }
    .stat b {
      display: block;
      color: var(--red);
      font-size: 24px;
      line-height: 1;
      font-weight: 1000;
    }
    .stat small {
      display: block;
      margin-top: 5px;
      font-size: 10px;
      font-weight: 900;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 18px 10px;
    }
    button {
      font-family: inherit;
      letter-spacing: 0;
      cursor: pointer;
    }
    .tabButton {
      border: 2px solid var(--red);
      background: #fff;
      color: var(--red);
      border-radius: 7px;
      min-height: 44px;
      font-size: 14px;
      font-weight: 900;
    }
    .tabButton.active {
      color: #fff;
      background: var(--red);
      box-shadow: 0 6px 0 var(--deep);
      transform: translateY(-3px);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .box {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 8px;
    }
    .box.red {
      border-color: var(--red);
      background: linear-gradient(180deg, #fff, #fff6f3);
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 12px;
      font-weight: 900;
    }
    input, select {
      width: 100%;
      min-height: 50px;
      border: 2px solid #2b2525;
      border-radius: 7px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      font-weight: 800;
    }
    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .submit {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #e01820, #a6080e);
      color: #fff;
      font-size: 18px;
      font-weight: 1000;
      box-shadow: 0 7px 0 #660307;
    }
    .ghost {
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 44px;
      border-radius: 7px;
      font-weight: 900;
    }
    .note {
      margin: 0;
      padding: 10px 12px;
      background: var(--soft);
      border-left: 5px solid var(--red);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 800;
    }
    .account {
      display: none;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #111;
      color: #fff;
    }
    .account.show { display: block; }
    .account b {
      display: block;
      font-size: 18px;
      font-weight: 1000;
    }
    .account small {
      display: block;
      margin-top: 3px;
      color: rgba(255,255,255,.78);
      font-weight: 800;
    }
    .message {
      display: none;
      margin-top: 12px;
      padding: 13px 14px;
      border-radius: 7px;
      font-weight: 900;
      line-height: 1.5;
    }
    .message.show { display: block; }
    .message.ok { color: #086b4f; background: #e8fff5; border: 2px solid #82d8bd; }
    .message.err { color: var(--deep); background: #fff1f1; border: 2px solid #f2a3a3; }
    .sectionTitle {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 12px;
    }
    .sectionTitle h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      font-weight: 1000;
    }
    .sectionTitle span {
      flex: none;
      color: var(--deep);
      font-size: 12px;
      font-weight: 900;
    }
    .ranking {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .rankItem {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 8px 10px;
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 8px;
    }
    .rankItem:nth-child(1) { border-color: var(--gold); background: #fff9dd; }
    .rankItem:nth-child(2) { border-color: #bfc7d2; }
    .rankItem:nth-child(3) { border-color: #cc8a46; }
    .place {
      display: grid;
      place-items: center;
      width: 38px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--black);
      color: #fff;
      font-weight: 1000;
    }
    .name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 1000;
    }
    .sub {
      display: block;
      margin-top: 2px;
      color: #765e5e;
      font-size: 11px;
      font-weight: 800;
    }
    .score {
      color: var(--red);
      font-size: 18px;
      font-weight: 1000;
      white-space: nowrap;
    }
    .weeks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 13px;
    }
    .weekChip {
      min-height: 48px;
      padding: 7px 5px;
      border: 2px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font-size: 11px;
      font-weight: 1000;
    }
    .weekChip.active {
      color: #fff;
      border-color: var(--red);
      background: var(--red);
    }
    .footer {
      padding: 20px 18px 28px;
      color: #fff;
      background: linear-gradient(180deg, var(--red), #650407);
      text-align: center;
      font-weight: 900;
    }
    .footer small {
      display: block;
      margin-top: 6px;
      color: rgba(255,255,255,.82);
      font-size: 11px;
    }
    @media (max-width: 360px) {
      .hero, .hero img { min-height: 330px; height: 330px; }
      .weekHead { grid-template-columns: 66px 1fr; }
      .weekInfo strong { font-size: 21px; }
      .inline { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <img src="joyfit9-pop.png" alt="JOYFIT24 9周年イベントPOP">
      <div class="heroText">
        <span class="kicker">会員ログイン制 ・ 1週間最大3回</span>
        <h1>9周年<br>チャレンジ</h1>
        <p>ログインして今週の記録を送信。ランキングはリアルタイムで更新されます。</p>
      </div>
    </section>

    <section class="section">
      <div class="weekPanel">
        <div class="weekHead">
          <div class="weekNo" id="weekNo">W1</div>
          <div class="weekInfo">
            <strong id="currentEvent">握力測定</strong>
            <span id="currentPeriod">8/3(月) - 8/9(日)</span>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><b id="participants">0</b><small>参加者</small></div>
          <div class="stat"><b id="attempts">0</b><small>チャレンジ</small></div>
          <div class="stat"><b id="tickets">0</b><small>くじ口数</small></div>
        </div>
      </div>
    </section>

    <nav class="tabs" aria-label="表示切替">
      <button class="tabButton active" type="button" data-tab="entry">記録を送信</button>
      <button class="tabButton" type="button" data-tab="ranking">ランキング</button>
    </nav>

    <section class="section panel active" id="entry">
      <div class="account" id="accountBox">
        <b id="accountName"></b>
        <small id="accountMeta"></small>
      </div>

      <form class="box red" id="loginForm">
        <p class="note">店舗で発行された参加者IDと4桁PINでログインしてください。ログイン後は記録だけ送信できます。</p>
        <label>
          参加者ID
          <input name="participantId" autocomplete="username" placeholder="例：0001" required>
        </label>
        <label>
          4桁PIN
          <input name="pin" autocomplete="current-password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="例：1234" required>
        </label>
        <button class="submit" type="submit">ログインする</button>
      </form>

      <form class="box red" id="entryForm" style="display:none">
        <p class="note">今週の種目は自動で選ばれます。同じ日は1回まで、1週間で最大3回まで登録できます。</p>
        <div class="inline">
          <label>
            記録
            <input name="score" inputmode="decimal" placeholder="例：55.0" required>
          </label>
          <label>
            入力者
            <select name="inputBy">
              <option value="self">本人</option>
              <option value="staff">スタッフ代理</option>
            </select>
          </label>
        </div>
        <button class="submit" type="submit">この記録を送信する</button>
        <button class="ghost" type="button" id="logoutButton">ログアウト</button>
      </form>

      <div class="message" id="message"></div>
    </section>

    <section class="section panel" id="ranking">
      <div class="sectionTitle">
        <h2>今週のTOP10</h2>
        <span id="unitLabel">合計 kg</span>
      </div>
      <ol class="ranking" id="rankingList"></ol>

      <div class="sectionTitle" style="margin-top:20px">
        <h2>過去Week</h2>
        <span>種目別TOP</span>
      </div>
      <div class="weeks" id="weekChips"></div>
      <ol class="ranking" id="historyList"></ol>
    </section>

    <footer class="footer">
      詳細はスタッフまで
      <small>JOYFIT24 経堂 9th Anniversary Event</small>
    </footer>
  </main>

  <script>
    const CONFIG = {
      gasEndpoint: "https://script.google.com/macros/s/AKfycbwHCmikLDfBN25bLcEkaLP6RlGyuf7Z6B64hGB0BJGcLQjxwiysATZ6qSdAZNl5h0m1RQ/exec"
    };

    const weeks = [
      { week: 1, event: "握力測定", unit: "kg", start: "2026-08-03", end: "2026-08-09", higherIsBetter: true },
      { week: 2, event: "前屈", unit: "cm", start: "2026-08-10", end: "2026-08-16", higherIsBetter: true },
      { week: 3, event: "プランク", unit: "秒", start: "2026-08-17", end: "2026-08-23", higherIsBetter: true },
      { week: 4, event: "腕立て伏せ", unit: "回", start: "2026-08-24", end: "2026-08-30", higherIsBetter: true }
    ];

    const state = {
      selectedWeek: getCurrentWeek().week,
      session: readSession(),
      records: [],
      rankings: {}
    };

    function getCurrentWeek() {
      const today = new Date();
      const active = weeks.find(w => today >= new Date(`${w.start}T00:00:00+09:00`) && today <= new Date(`${w.end}T23:59:59+09:00`));
      if (active) return active;
      if (today < new Date(`${weeks[0].start}T00:00:00+09:00`)) return weeks[0];
      return weeks[weeks.length - 1];
    }

    function formatPeriod(w) {
      const s = new Date(`${w.start}T00:00:00+09:00`);
      const e = new Date(`${w.end}T00:00:00+09:00`);
      const day = ["日", "月", "火", "水", "木", "金", "土"];
      return `${s.getMonth() + 1}/${s.getDate()}(${day[s.getDay()]}) - ${e.getMonth() + 1}/${e.getDate()}(${day[e.getDay()]})`;
    }

    function render() {
      const current = getCurrentWeek();
      const stats = summarize();
      document.getElementById("weekNo").textContent = `W${current.week}`;
      document.getElementById("currentEvent").textContent = current.event;
      document.getElementById("currentPeriod").textContent = formatPeriod(current);
      document.getElementById("participants").textContent = stats.participants;
      document.getElementById("attempts").textContent = stats.attempts;
      document.getElementById("tickets").textContent = stats.tickets;
      document.getElementById("unitLabel").textContent = `合計 ${current.unit}`;
      renderAccount();
      renderRanking("rankingList", current.week);
      renderWeekChips();
      renderRanking("historyList", state.selectedWeek);
    }

    function summarize() {
      const current = getCurrentWeek();
      const currentRecords = state.records.filter(r => Number(r.week) === current.week);
      const ids = new Set(currentRecords.map(r => r.participantId));
      return { participants: ids.size, attempts: currentRecords.length, tickets: state.records.length };
    }

    function renderAccount() {
      const loggedIn = Boolean(state.session && state.session.token);
      document.getElementById("loginForm").style.display = loggedIn ? "none" : "grid";
      document.getElementById("entryForm").style.display = loggedIn ? "grid" : "none";
      document.getElementById("accountBox").classList.toggle("show", loggedIn);
      if (loggedIn) {
        document.getElementById("accountName").textContent = state.session.displayName;
        document.getElementById("accountMeta").textContent = `参加者ID ${state.session.participantId} / ${state.session.division === "staff" ? "スタッフ" : "会員"}`;
      }
    }

    function renderRanking(target, weekNo) {
      const list = document.getElementById(target);
      const w = weeks.find(item => item.week === weekNo);
      const rows = state.rankings[String(weekNo)] || [];
      list.innerHTML = "";
      if (!rows.length) {
        list.innerHTML = `<li class="rankItem"><div class="place">-</div><div class="name">まだ記録がありません<span class="sub">最初のチャレンジをお待ちしています</span></div><div class="score">0 ${w.unit}</div></li>`;
        return;
      }
      rows.forEach(row => {
        const li = document.createElement("li");
        li.className = "rankItem";
        li.innerHTML = `
          <div class="place">${row.rank}</div>
          <div class="name">${escapeHtml(row.displayName)}${row.division === "staff" ? " STAFF" : ""}<span class="sub">${row.attempts}回チャレンジ</span></div>
          <div class="score">${formatScore(row.total)} ${w.unit}</div>
        `;
        list.appendChild(li);
      });
    }

    function renderWeekChips() {
      const box = document.getElementById("weekChips");
      box.innerHTML = "";
      weeks.forEach(w => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `weekChip ${w.week === state.selectedWeek ? "active" : ""}`;
        button.textContent = `W${w.week} ${w.event}`;
        button.addEventListener("click", () => {
          state.selectedWeek = w.week;
          render();
        });
        box.appendChild(button);
      });
    }

    async function loadData() {
      try {
        const data = await api({ action: "list" });
        if (data.ok) {
          state.records = data.records || [];
          state.rankings = data.rankings || {};
        } else {
          showMessage(data.message || "データを取得できませんでした。", false);
        }
      } catch (error) {
        showMessage("データ取得に失敗しました。GASの公開設定を確認してください。", false);
      }
      render();
    }

    async function login(participantId, pin) {
      const data = await api({ action: "login", participantId, pin });
      if (!data.ok) return data;
      state.session = data.session;
      localStorage.setItem("joyfitSession", JSON.stringify(state.session));
      return data;
    }

    async function submitRecord(payload) {
      return api({ action: "submit", token: state.session.token, payload: JSON.stringify(payload) });
    }

    function api(params) {
      return new Promise((resolve, reject) => {
        const callbackName = `joyfitCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const search = new URLSearchParams({ ...params, callback: callbackName });
        window[callbackName] = data => {
          resolve(data);
          script.remove();
          delete window[callbackName];
        };
        script.onerror = () => {
          reject(new Error("request failed"));
          script.remove();
          delete window[callbackName];
        };
        script.src = `${CONFIG.gasEndpoint}?${search.toString()}`;
        document.body.appendChild(script);
      });
    }

    document.querySelectorAll(".tabButton").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tabButton").forEach(b => b.classList.toggle("active", b === button));
        document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === button.dataset.tab));
      });
    });

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        const data = await login(String(form.get("participantId") || "").trim(), String(form.get("pin") || "").trim());
        if (!data.ok) {
          showMessage(data.message || "ログインできませんでした。", false);
          return;
        }
        showMessage("ログインしました。今週の記録を入力できます。", true);
        event.currentTarget.reset();
        render();
      } catch (error) {
        showMessage("ログインに失敗しました。", false);
      }
    });

    document.getElementById("entryForm").addEventListener("submit", async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const current = getCurrentWeek();
      const payload = {
        week: current.week,
        event: current.event,
        score: Number(form.get("score")),
        unit: current.unit,
        inputBy: String(form.get("inputBy") || "self")
      };
      if (!Number.isFinite(payload.score)) {
        showMessage("記録を数字で入力してください。", false);
        return;
      }
      try {
        const result = await submitRecord(payload);
        if (!result.ok) {
          showMessage(result.message || "送信できませんでした。", false);
          return;
        }
        showMessage("送信完了！ランキングに反映しました。", true);
        event.currentTarget.reset();
        await loadData();
      } catch (error) {
        showMessage("送信に失敗しました。", false);
      }
    });

    document.getElementById("logoutButton").addEventListener("click", () => {
      localStorage.removeItem("joyfitSession");
      state.session = null;
      showMessage("ログアウトしました。", true);
      render();
    });

    function readSession() {
      try { return JSON.parse(localStorage.getItem("joyfitSession") || "null"); }
      catch { return null; }
    }

    function showMessage(text, ok) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = `message show ${ok ? "ok" : "err"}`;
    }

    function formatScore(value) {
      return Number.isInteger(Number(value)) ? String(value) : Number(value).toFixed(1);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[s]));
    }

    loadData();
  </script>
</body>
</html>
