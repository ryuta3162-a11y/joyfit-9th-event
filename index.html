<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JOYFIT24 9周年チャレンジ</title>
  <style>
    :root {
      --red: #d70f16;
      --deep-red: #8e070c;
      --black: #101010;
      --ink: #221f1f;
      --gold: #f7c948;
      --line: #e7d7d7;
      --paper: #fffaf5;
      --soft: #f8eeee;
      --green: #097969;
      font-family: "Arial", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 4%, rgba(247, 201, 72, .20), transparent 22rem),
        linear-gradient(180deg, #fff 0%, #fff6f2 38%, #f4e7e2 100%);
      letter-spacing: 0;
    }

    .app {
      width: min(100%, 460px);
      margin: 0 auto;
      min-height: 100vh;
      background: var(--paper);
      box-shadow: 0 0 42px rgba(61, 13, 13, .18);
    }

    .hero {
      position: relative;
      min-height: 385px;
      overflow: hidden;
      color: #fff;
      background: var(--black);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.12) 0%, rgba(0,0,0,.05) 44%, rgba(141, 7, 12, .92) 100%);
      pointer-events: none;
    }

    .hero img {
      width: 100%;
      height: 100%;
      min-height: 385px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .heroText {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 1;
      text-shadow: 0 3px 12px rgba(0,0,0,.55);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      background: rgba(255,255,255,.92);
      color: var(--deep-red);
      border-radius: 999px;
      font-weight: 900;
      font-size: 12px;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(34px, 11vw, 50px);
      line-height: .92;
      font-weight: 1000;
    }

    .heroText p {
      margin: 0;
      font-weight: 800;
      font-size: 15px;
    }

    .section {
      padding: 18px;
    }

    .weekPanel {
      margin-top: -8px;
      position: relative;
      z-index: 2;
      background: #fff;
      border: 3px solid var(--red);
      border-radius: 8px;
      box-shadow: 0 12px 26px rgba(126, 13, 13, .18);
      overflow: hidden;
    }

    .weekHead {
      display: grid;
      grid-template-columns: 78px 1fr;
      align-items: stretch;
      background: var(--red);
      color: #fff;
    }

    .weekNo {
      display: grid;
      place-items: center;
      min-height: 76px;
      background: var(--black);
      font-size: 34px;
      font-weight: 1000;
    }

    .weekInfo {
      padding: 12px 14px;
    }

    .weekInfo strong {
      display: block;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 1000;
    }

    .weekInfo span {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      font-weight: 800;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid rgba(255,255,255,.26);
    }

    .stat {
      padding: 10px 8px 12px;
      text-align: center;
      background: #fff;
      border-right: 1px solid var(--line);
    }

    .stat:last-child { border-right: 0; }
    .stat b {
      display: block;
      color: var(--red);
      font-size: 24px;
      line-height: 1;
    }
    .stat small {
      display: block;
      margin-top: 5px;
      font-size: 10px;
      font-weight: 800;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 18px 10px;
    }

    .tabButton {
      appearance: none;
      border: 2px solid var(--red);
      background: #fff;
      color: var(--red);
      border-radius: 7px;
      min-height: 44px;
      font-weight: 900;
      font-size: 14px;
    }

    .tabButton.active {
      background: var(--red);
      color: #fff;
      box-shadow: 0 6px 0 var(--deep-red);
      transform: translateY(-3px);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      font-size: 12px;
      font-weight: 900;
    }

    input, select {
      width: 100%;
      min-height: 48px;
      border: 2px solid #2c2525;
      border-radius: 7px;
      padding: 10px 12px;
      background: #fff;
      font-size: 16px;
      font-weight: 800;
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border: 2px solid var(--line);
      border-radius: 7px;
      background: #fff;
      font-size: 13px;
    }

    .check input {
      width: 20px;
      min-height: 20px;
      accent-color: var(--red);
    }

    .submit {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #e01820 0%, #a6080e 100%);
      color: #fff;
      font-size: 18px;
      font-weight: 1000;
      box-shadow: 0 7px 0 #690407;
    }

    .submit:active {
      transform: translateY(3px);
      box-shadow: 0 4px 0 #690407;
    }

    .note {
      margin: 0;
      padding: 10px 12px;
      background: var(--soft);
      border-left: 5px solid var(--red);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 700;
    }

    .message {
      display: none;
      margin-top: 12px;
      padding: 13px 14px;
      border-radius: 7px;
      font-weight: 900;
      line-height: 1.5;
    }

    .message.show { display: block; }
    .message.ok { background: #e8fff5; color: var(--green); border: 2px solid #7ad6b9; }
    .message.err { background: #fff1f1; color: var(--deep-red); border: 2px solid #f2a3a3; }

    .sectionTitle {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      margin: 0 0 12px;
    }

    .sectionTitle h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      font-weight: 1000;
    }

    .sectionTitle span {
      flex: none;
      color: var(--deep-red);
      font-size: 12px;
      font-weight: 900;
    }

    .ranking {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .rankItem {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 8px 10px;
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 8px;
    }

    .rankItem:nth-child(1) { border-color: var(--gold); background: #fff9dd; }
    .rankItem:nth-child(2) { border-color: #bfc7d2; }
    .rankItem:nth-child(3) { border-color: #cc8a46; }

    .place {
      display: grid;
      place-items: center;
      width: 38px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--black);
      color: #fff;
      font-weight: 1000;
    }

    .name {
      min-width: 0;
      font-weight: 1000;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sub {
      display: block;
      margin-top: 2px;
      color: #735f5f;
      font-size: 11px;
      font-weight: 800;
    }

    .score {
      color: var(--red);
      font-size: 18px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .weeks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 13px;
    }

    .weekChip {
      border: 2px solid var(--line);
      border-radius: 7px;
      background: #fff;
      min-height: 48px;
      padding: 7px 5px;
      color: var(--ink);
      font-weight: 1000;
      font-size: 11px;
    }

    .weekChip.active {
      border-color: var(--red);
      background: var(--red);
      color: #fff;
    }

    .footer {
      padding: 20px 18px 28px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255,255,255,.14) 0 8px, transparent 8px 16px),
        linear-gradient(180deg, var(--red), #650407);
      text-align: center;
      font-weight: 900;
    }

    .footer small {
      display: block;
      margin-top: 6px;
      color: rgba(255,255,255,.82);
      font-size: 11px;
    }

    @media (max-width: 360px) {
      .hero { min-height: 350px; }
      .hero img { min-height: 350px; }
      .weekHead { grid-template-columns: 66px 1fr; }
      .weekInfo strong { font-size: 21px; }
      .inline { grid-template-columns: 1fr; }
      .score { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <img src="joyfit9-pop.png" alt="JOYFIT24 9周年イベントPOP">
      <div class="heroText">
        <span class="kicker">8/3 START ・ 1週間最大3回</span>
        <h1>9周年<br>チャレンジ</h1>
        <p>記録を送って、ランキングとくじチャンスをチェック</p>
      </div>
    </section>

    <section class="section">
      <div class="weekPanel">
        <div class="weekHead">
          <div class="weekNo" id="weekNo">W1</div>
          <div class="weekInfo">
            <strong id="currentEvent">握力測定</strong>
            <span id="currentPeriod">8/3(月) - 8/9(日)</span>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><b id="participants">0</b><small>参加者</small></div>
          <div class="stat"><b id="attempts">0</b><small>チャレンジ</small></div>
          <div class="stat"><b id="tickets">0</b><small>くじ口数</small></div>
        </div>
      </div>
    </section>

    <nav class="tabs" aria-label="表示切替">
      <button class="tabButton active" type="button" data-tab="entry">記録を送信</button>
      <button class="tabButton" type="button" data-tab="ranking">ランキング</button>
    </nav>

    <section class="section panel active" id="entry">
      <form class="form" id="entryForm">
        <p class="note">表示されている今週の種目だけ送信できます。イニシャルはランキングに表示されます。識別メモは集計用で、画面には表示しません。</p>

        <div class="inline">
          <label>
            イニシャル
            <input name="displayName" autocomplete="nickname" maxlength="12" placeholder="例：T.K" required>
          </label>
          <label>
            識別メモ
            <input name="participantKey" autocomplete="off" maxlength="24" placeholder="会員No下4桁など">
          </label>
        </div>

        <div class="inline">
          <label>
            記録
            <input name="score" inputmode="decimal" placeholder="例：55.0" required>
          </label>
          <label>
            区分
            <select name="division">
              <option value="member">会員</option>
              <option value="staff">スタッフ</option>
            </select>
          </label>
        </div>

        <label class="check">
          <input type="checkbox" name="proxyInput">
          スタッフが代理入力
        </label>

        <button class="submit" type="submit">この記録を送信する</button>
      </form>
      <div class="message" id="message"></div>
    </section>

    <section class="section panel" id="ranking">
      <div class="sectionTitle">
        <h2>今週のTOP10</h2>
        <span id="unitLabel">合計 kg</span>
      </div>
      <ol class="ranking" id="rankingList"></ol>

      <div class="sectionTitle" style="margin-top:20px">
        <h2>過去Week</h2>
        <span>種目別TOP</span>
      </div>
      <div class="weeks" id="weekChips"></div>
      <ol class="ranking" id="historyList"></ol>
    </section>

    <footer class="footer">
      詳細はスタッフまで
      <small>JOYFIT24 経堂 9th Anniversary Event</small>
    </footer>
  </main>

  <script>
    const CONFIG = {
      gasEndpoint: ""
    };

    const weeks = [
      { week: 1, event: "握力測定", unit: "kg", start: "2026-08-03", end: "2026-08-09", higherIsBetter: true },
      { week: 2, event: "前屈", unit: "cm", start: "2026-08-10", end: "2026-08-16", higherIsBetter: true },
      { week: 3, event: "プランク", unit: "秒", start: "2026-08-17", end: "2026-08-23", higherIsBetter: true },
      { week: 4, event: "腕立て伏せ", unit: "回", start: "2026-08-24", end: "2026-08-30", higherIsBetter: true }
    ];

    const demoRecords = [
      ["A.S", "1010", 1, "握力測定", 55, "member", "2026-08-03"],
      ["M.K", "1020", 1, "握力測定", 48, "member", "2026-08-04"],
      ["R.T", "1030", 1, "握力測定", 61, "staff", "2026-08-04"],
      ["A.S", "1010", 1, "握力測定", 52, "member", "2026-08-05"],
      ["Y.N", "1040", 2, "前屈", 19, "member", "2026-08-10"],
      ["H.I", "1050", 3, "プランク", 142, "member", "2026-08-17"],
      ["S.O", "1060", 4, "腕立て伏せ", 63, "member", "2026-08-24"]
    ].map((r, i) => ({
      id: `demo-${i}`,
      createdAt: new Date(`${r[6]}T10:00:00+09:00`).toISOString(),
      displayName: r[0],
      participantKey: r[1],
      week: r[2],
      event: r[3],
      score: r[4],
      division: r[5],
      proxyInput: false
    }));

    const state = {
      selectedWeek: getCurrentWeek().week,
      records: [...demoRecords]
    };

    function getCurrentWeek() {
      const today = new Date();
      const active = weeks.find(w => today >= new Date(`${w.start}T00:00:00+09:00`) && today <= new Date(`${w.end}T23:59:59+09:00`));
      if (active) return active;
      if (today < new Date(`${weeks[0].start}T00:00:00+09:00`)) return weeks[0];
      return weeks[weeks.length - 1];
    }

    function formatPeriod(w) {
      const s = new Date(`${w.start}T00:00:00+09:00`);
      const e = new Date(`${w.end}T00:00:00+09:00`);
      const day = ["日", "月", "火", "水", "木", "金", "土"];
      return `${s.getMonth() + 1}/${s.getDate()}(${day[s.getDay()]}) - ${e.getMonth() + 1}/${e.getDate()}(${day[e.getDay()]})`;
    }

    function participantId(record) {
      return `${record.displayName.trim().toUpperCase()}::${(record.participantKey || "").trim().toUpperCase()}`;
    }

    function currentWeekRecords() {
      const current = getCurrentWeek();
      return state.records.filter(r => Number(r.week) === current.week);
    }

    function summarize(records) {
      const ids = new Set(records.map(participantId));
      return {
        participants: ids.size,
        attempts: records.length,
        tickets: records.length
      };
    }

    function rankingForWeek(weekNo) {
      const w = weeks.find(item => item.week === weekNo);
      const grouped = new Map();
      state.records.filter(r => Number(r.week) === weekNo).forEach(record => {
        const id = participantId(record);
        const existing = grouped.get(id) || {
          displayName: record.displayName,
          division: record.division,
          attempts: 0,
          total: 0
        };
        existing.attempts += 1;
        existing.total += Number(record.score);
        if (record.division === "staff") existing.division = "staff";
        grouped.set(id, existing);
      });
      return Array.from(grouped.values())
        .sort((a, b) => w.higherIsBetter ? b.total - a.total : a.total - b.total)
        .slice(0, 10);
    }

    function renderRanking(target, weekNo) {
      const list = document.getElementById(target);
      const w = weeks.find(item => item.week === weekNo);
      const rows = rankingForWeek(weekNo);
      list.innerHTML = "";
      if (!rows.length) {
        list.innerHTML = `<li class="rankItem"><div class="place">-</div><div class="name">まだ記録がありません<span class="sub">最初のチャレンジをお待ちしています</span></div><div class="score">0 ${w.unit}</div></li>`;
        return;
      }
      rows.forEach((row, index) => {
        const li = document.createElement("li");
        li.className = "rankItem";
        li.innerHTML = `
          <div class="place">${index + 1}</div>
          <div class="name">${escapeHtml(row.displayName)}${row.division === "staff" ? " STAFF" : ""}<span class="sub">${row.attempts}回チャレンジ</span></div>
          <div class="score">${formatScore(row.total)} ${w.unit}</div>
        `;
        list.appendChild(li);
      });
    }

    function render() {
      const current = getCurrentWeek();
      const stats = summarize(currentWeekRecords());
      document.getElementById("weekNo").textContent = `W${current.week}`;
      document.getElementById("currentEvent").textContent = current.event;
      document.getElementById("currentPeriod").textContent = formatPeriod(current);
      document.getElementById("participants").textContent = stats.participants;
      document.getElementById("attempts").textContent = stats.attempts;
      document.getElementById("tickets").textContent = stats.tickets;
      document.getElementById("unitLabel").textContent = `合計 ${current.unit}`;
      renderRanking("rankingList", current.week);
      renderWeekChips();
      renderRanking("historyList", state.selectedWeek);
    }

    function renderWeekChips() {
      const box = document.getElementById("weekChips");
      box.innerHTML = "";
      weeks.forEach(w => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `weekChip ${w.week === state.selectedWeek ? "active" : ""}`;
        button.textContent = `W${w.week} ${w.event}`;
        button.addEventListener("click", () => {
          state.selectedWeek = w.week;
          render();
        });
        box.appendChild(button);
      });
    }

    async function loadRecords() {
      if (!CONFIG.gasEndpoint) {
        render();
        return;
      }
      try {
        const data = await jsonp(CONFIG.gasEndpoint, { action: "list" });
        if (data.ok && Array.isArray(data.records)) state.records = data.records;
      } catch (error) {
        showMessage("ランキングの取得に失敗しました。デモデータを表示しています。", false);
      }
      render();
    }

    async function submitRecord(payload) {
      if (!CONFIG.gasEndpoint) {
        state.records.unshift({
          id: crypto.randomUUID(),
          createdAt: new Date().toISOString(),
          ...payload
        });
        return { ok: true, demo: true };
      }
      return jsonp(CONFIG.gasEndpoint, { action: "submit", payload: JSON.stringify(payload) });
    }

    function validateLocal(payload) {
      const dateKey = new Date().toISOString().slice(0, 10);
      const samePersonWeek = state.records.filter(r => Number(r.week) === payload.week && participantId(r) === participantId(payload));
      if (samePersonWeek.length >= 3) return "この週のチャレンジはすでに3回分登録されています。";
      if (samePersonWeek.some(r => String(r.createdAt || "").slice(0, 10) === dateKey)) return "同じ日の登録は1回までです。";
      return "";
    }

    document.querySelectorAll(".tabButton").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tabButton").forEach(b => b.classList.toggle("active", b === button));
        document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === button.dataset.tab));
      });
    });

    document.getElementById("entryForm").addEventListener("submit", async event => {
      event.preventDefault();
      const formElement = event.currentTarget;
      const form = new FormData(formElement);
      const current = getCurrentWeek();
      const payload = {
        displayName: String(form.get("displayName") || "").trim(),
        participantKey: String(form.get("participantKey") || "").trim(),
        week: current.week,
        event: current.event,
        score: Number(form.get("score")),
        unit: current.unit,
        division: String(form.get("division")),
        proxyInput: form.has("proxyInput")
      };
      if (!payload.displayName || Number.isNaN(payload.score)) {
        showMessage("イニシャルと記録を入力してください。", false);
        return;
      }
      const localError = validateLocal(payload);
      if (!CONFIG.gasEndpoint && localError) {
        showMessage(localError, false);
        return;
      }
      try {
        const result = await submitRecord(payload);
        if (!result.ok) {
          showMessage(result.message || "送信できませんでした。", false);
          return;
        }
        showMessage(`送信完了！ ${payload.displayName}さんの${current.event}を登録しました。`, true);
        formElement.reset();
        await loadRecords();
      } catch (error) {
        showMessage("通信に失敗しました。時間をおいて再度お試しください。", false);
      }
    });

    function showMessage(text, ok) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = `message show ${ok ? "ok" : "err"}`;
    }

    function formatScore(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, s => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[s]));
    }

    function jsonp(url, params) {
      return new Promise((resolve, reject) => {
        const callbackName = `joyfitCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const search = new URLSearchParams({ ...params, callback: callbackName });
        window[callbackName] = data => {
          resolve(data);
          script.remove();
          delete window[callbackName];
        };
        script.onerror = () => {
          reject(new Error("JSONP request failed"));
          script.remove();
          delete window[callbackName];
        };
        script.src = `${url}${url.includes("?") ? "&" : "?"}${search.toString()}`;
        document.body.appendChild(script);
      });
    }

    loadRecords();
  </script>
</body>
</html>
