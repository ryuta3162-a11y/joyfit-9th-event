<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JOYFIT24 9周年チャレンジ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #d0122d;
      --red-deep: #8e0a1c;
      --ink: #121212;
      --mute: #6b6562;
      --line: rgba(18, 18, 18, .12);
      --paper: #f3f1ef;
      --board: #0c0c0d;
      --gold: #d4a017;
      --ok: #0f7a5a;
      --shadow: 0 18px 40px rgba(0, 0, 0, .28);
      --sans: "Noto Sans JP", "Hiragino Sans", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: #ece7e4;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(ellipse at 50% 0%, rgba(208, 18, 45, .12), transparent 46%),
        linear-gradient(180deg, #f7f4f2 0%, #ebe6e2 100%);
    }

    button, input, select {
      font: inherit;
    }

    button { cursor: pointer; }

    .app {
      position: relative;
      width: min(100%, 430px);
      min-height: 100svh;
      margin: 0 auto;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 0 80px rgba(80, 20, 30, .18);
    }

    .view { display: none; }
    .view.active { display: block; }

    .bootOverlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      background: #0e0e10;
      transition: opacity .55s ease, visibility .55s ease;
    }

    .bootOverlay.is-done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .bootMark {
      text-align: center;
      color: #fff;
      animation: bootPulse 1s ease both;
    }

    .bootMark strong {
      display: block;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: .1em;
      line-height: 1.1;
    }

    .bootMark span {
      display: block;
      margin-top: 8px;
      color: #d0122d;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .22em;
    }

    .bootMark i {
      display: block;
      width: 48px;
      height: 3px;
      margin: 16px auto 0;
      background: #d0122d;
      animation: pulseLine 1.2s ease-in-out infinite;
    }

    @keyframes bootPulse {
      from { opacity: 0; transform: scale(.92); }
      to { opacity: 1; transform: none; }
    }

    .authInner.is-ready .brandBlock,
    .authInner.is-ready .promoBoard,
    .authInner.is-ready .loginBoard {
      animation: riseIn .65s cubic-bezier(.22, 1, .36, 1) both;
    }

    .authInner.is-ready .brandBlock { animation-delay: .05s; }
    .authInner.is-ready .promoBoard { animation-delay: .18s; }
    .authInner.is-ready .loginBoard { animation-delay: .32s; }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: none; }
    }

    /* ===== AUTH ===== */
    .authHero {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, #fff 0%, #f7f4f2 48%, #f0ebe8 100%);
    }

    .authHero::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 42%;
      background:
        linear-gradient(145deg, #1a1a1c 0%, #141416 55%, #5a0c18 130%),
        repeating-linear-gradient(
          -18deg,
          transparent 0 34px,
          rgba(208, 18, 45, .12) 34px 35px
        );
      clip-path: polygon(0 0, 100% 0, 100% 78%, 0 100%);
      animation: arenaDrift 10s ease-in-out infinite alternate;
    }

    .authHero::after {
      content: "9";
      position: absolute;
      right: -12px;
      top: 8%;
      font-size: clamp(160px, 48vw, 210px);
      line-height: .75;
      letter-spacing: -.04em;
      color: rgba(255, 255, 255, .07);
      pointer-events: none;
      user-select: none;
    }

    @keyframes arenaDrift {
      from { transform: translate3d(-4px, 0, 0); }
      to { transform: translate3d(6px, 4px, 0); }
    }

    .authInner {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: start;
      gap: 22px;
      min-height: 100svh;
      padding: 28px 20px 28px;
    }

    .brandBlock {
      display: grid;
      gap: 10px;
      color: #fff;
      padding-bottom: 8px;
    }

    .brandBlock .store {
      margin: 0;
      font-size: clamp(40px, 11vw, 48px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: .04em;
      text-shadow: 0 10px 30px rgba(0, 0, 0, .35);
    }

    .brandBlock .store span {
      display: block;
      color: #ff4d66;
    }

    .brandBlock .anniversary {
      margin: 0;
      color: rgba(255, 255, 255, .78);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    @keyframes brandRise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: none; }
    }

    .authPulse {
      width: 88px;
      height: 3px;
      margin-top: 8px;
      background: var(--red);
      transform-origin: left center;
      animation: pulseLine 2.6s ease-in-out infinite;
      box-shadow: 0 0 18px rgba(208, 18, 45, .7);
    }

    @keyframes pulseLine {
      0%, 100% { transform: scaleX(.35); opacity: .5; }
      50% { transform: scaleX(1); opacity: 1; }
    }

    .promoBoard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-top: 8px;
      border: 2px solid var(--ink);
      background: #fff;
      box-shadow: 8px 8px 0 rgba(208, 18, 45, .18);
    }

    .promoBoard .promoCol {
      display: grid;
      align-content: center;
      gap: 6px;
      min-height: 112px;
      padding: 16px 14px;
    }

    .promoBoard .promoCol + .promoCol {
      border-left: 2px solid var(--ink);
      background: linear-gradient(180deg, #fff 0%, #fff5f6 100%);
    }

    .promoBoard .promoCol b {
      font-size: 15px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: .01em;
    }

    .promoBoard .promoCol span {
      color: var(--red);
      font-size: 15px;
      line-height: 1.35;
      font-weight: 900;
    }

    .promoBoard .promoCol small {
      color: var(--mute);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
    }

    .loginBoard {
      display: grid;
      gap: 14px;
      margin-top: 4px;
      padding: 18px 16px 16px;
      border: 1px solid rgba(18, 18, 18, .1);
      background: #fff;
      box-shadow: 0 16px 36px rgba(40, 20, 20, .08);
    }

    .loginBoard label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .fieldHint {
      color: var(--mute);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: 0;
    }

    .loginBoard input {
      width: 100%;
      min-height: 54px;
      padding: 12px 14px;
      border: 0;
      border-bottom: 2px solid rgba(18, 18, 18, .28);
      border-radius: 0;
      background: #f7f5f4;
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
      outline: none;
      transition: border-color .2s ease, background .2s ease;
    }

    .loginBoard input::placeholder { color: rgba(18, 18, 18, .32); }

    .loginBoard input:focus {
      border-bottom-color: var(--red);
      background: #fff;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 12px 14px;
      border: 0;
      border-bottom: 2px solid rgba(18, 18, 18, .28);
      border-radius: 0;
      background: #f7f5f4;
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
      outline: none;
      transition: border-color .2s ease, background .2s ease;
    }

    input::placeholder { color: rgba(18, 18, 18, .32); }

    input:focus {
      border-bottom-color: var(--red);
      background: #fff;
    }

    .primaryButton {
      width: 100%;
      min-height: 56px;
      margin-top: 4px;
      border: 0;
      border-radius: 2px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .12em;
      background: linear-gradient(180deg, #e21834, #b10e24);
      box-shadow: 0 8px 0 #6f0816;
      transition: transform .14s ease, box-shadow .14s ease, filter .14s ease;
    }

    .primaryButton:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #6f0816;
    }

    .primaryButton:disabled {
      cursor: wait;
      filter: saturate(.75) brightness(.9);
    }

    .appView .primaryButton,
    .entryBoard .primaryButton {
      color: #fff;
    }

    .message {
      display: none;
      padding: 12px 0 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
    }

    .message.show { display: block; }
    .message.ok { color: var(--ok); }
    .message.err { color: var(--red-deep); }

    .appView .message.ok {
      color: var(--ok);
      border-top: 1px solid rgba(15, 122, 90, .25);
    }

    .appView .message.err {
      color: var(--red-deep);
      border-top: 1px solid rgba(208, 18, 45, .2);
    }

    /* ===== APP / BOARD ===== */
    .shellHeader {
      position: relative;
      overflow: hidden;
      padding: 20px 18px 22px;
      color: #fff;
      background:
        linear-gradient(160deg, rgba(208, 18, 45, .18), transparent 46%),
        linear-gradient(180deg, #141416 0%, #090909 70%, #2a0710 160%);
    }

    .shellHeader::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0 46px,
        rgba(255, 255, 255, .03) 46px 47px
      );
      pointer-events: none;
    }

    .headerTop,
    .eventBoard,
    .tabs,
    .section {
      position: relative;
      z-index: 1;
    }

    .headerTop {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .headerBrand {
      min-width: 0;
    }

    .headerBrand .eyebrow {
      display: block;
      color: rgba(255, 255, 255, .62);
      font-weight: 900;
      font-size: 14px;
      letter-spacing: .18em;
    }

    .headerBrand b {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
      font-weight: 900;
    }

    .logout {
      flex: none;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, .35);
      border-radius: 0;
      background: transparent;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .eventBoard {
      margin-top: 22px;
      display: grid;
      gap: 8px;
    }

    .eventMeta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255, 255, 255, .7);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
    }

    .eventBoard strong {
      display: block;
      font-size: clamp(36px, 10vw, 46px);
      line-height: 1.05;
      letter-spacing: .04em;
      font-weight: 900;
    }

    .eventBoard .period {
      color: rgba(255, 255, 255, .55);
      font-size: 12px;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--line);
      background: #ebe8e5;
    }

    .tabButton {
      min-height: 48px;
      border: 0;
      border-bottom: 3px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--mute);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .tabButton.active {
      color: var(--ink);
      border-bottom-color: var(--red);
      background: var(--paper);
    }

    .section {
      display: none;
      padding: 18px 18px 28px;
      background: var(--paper);
    }

    .section.active {
      display: block;
      animation: panelIn .35s ease both;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .entryBoard,
    .rankBoard {
      display: grid;
      gap: 18px;
    }

    .sectionHead {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }

    .sectionHead h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .14em;
    }

    .sectionHead span {
      color: var(--mute);
      font-size: 12px;
      font-weight: 700;
    }

    .scoreStage {
      display: grid;
      gap: 6px;
      padding: 8px 0 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .scoreStage .guide {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .scoreStage b {
      font-size: 22px;
      font-weight: 900;
    }

    .scoreStage .unit {
      font-weight: 900;
      font-size: 28px;
      letter-spacing: .04em;
      color: var(--red);
    }

    .scoreStage small {
      color: var(--mute);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 500;
    }

    .formGrid {
      display: grid;
      gap: 14px;
    }

    .appView label,
    .entryBoard label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .entryBoard input {
      font-weight: 900;
      border: 0;
      border-bottom: 2px solid var(--ink);
      background: transparent;
      color: var(--ink);
      font-size: 42px;
      letter-spacing: .04em;
      min-height: 72px;
      padding: 8px 0;
    }

    .entryBoard input::placeholder {
      color: rgba(18, 18, 18, .22);
      font-size: 34px;
    }

    .entryBoard input:focus {
      border-bottom-color: var(--red);
      background: transparent;
      box-shadow: none;
    }

    .ranking {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--line);
    }

    .rankItem {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      animation: rankIn .4s ease both;
    }

    .rankItem:nth-child(1) { animation-delay: .02s; }
    .rankItem:nth-child(2) { animation-delay: .05s; }
    .rankItem:nth-child(3) { animation-delay: .08s; }
    .rankItem:nth-child(4) { animation-delay: .11s; }
    .rankItem:nth-child(5) { animation-delay: .14s; }

    @keyframes rankIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: none; }
    }

    .rankItem:nth-child(1) .place {
      background: var(--gold);
      color: #111;
    }

    .rankItem:nth-child(1) .score {
      color: var(--ink);
    }

    .place {
      font-weight: 900;
      display: grid;
      place-items: center;
      width: 34px;
      aspect-ratio: 1;
      border-radius: 0;
      background: var(--board);
      color: #fff;
      font-size: 18px;
      letter-spacing: .02em;
    }

    .name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 900;
    }

    .sub {
      display: block;
      margin-top: 3px;
      color: var(--mute);
      font-size: 11px;
      font-weight: 500;
    }

    .score {
      color: var(--red);
      font-weight: 900;
      font-size: 24px;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .weeks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .weekChip {
      min-height: 52px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
    }

    .weekChip.active {
      border-color: var(--ink);
      background: var(--board);
      color: #fff;
    }

    .rankBoard + .rankBoard {
      margin-top: 28px;
      padding-top: 8px;
    }

    /* ===== LOADING ===== */
    .loadingOverlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(6, 6, 7, .82);
      backdrop-filter: blur(10px);
    }

    .loadingOverlay.show { display: grid; }

    .loadingPanel {
      width: min(100%, 320px);
      padding: 28px 22px;
      border-top: 3px solid var(--red);
      background: #0e0e10;
      color: #fff;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .loaderRing {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border: 3px solid rgba(255, 255, 255, .12);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loadingPanel strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .loadingPanel p {
      margin: 8px 0 18px;
      color: rgba(255, 255, 255, .65);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 500;
    }

    .progressTrack {
      height: 3px;
      overflow: hidden;
      background: rgba(255, 255, 255, .12);
    }

    .progressBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fff, var(--red));
      transition: width .18s ease;
    }

    .progressText {
      margin-top: 10px;
      color: rgba(255, 255, 255, .85);
      font-weight: 900;
      font-size: 18px;
      letter-spacing: .08em;
    }

    @media (max-width: 380px) {
      .authInner { padding: 22px 16px 18px; gap: 22px; }
      .brandBlock .store { font-size: 36px; }
      .eventBoard strong { font-size: 40px; }
      .entryBoard input { font-size: 36px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="bootOverlay" id="bootOverlay" aria-hidden="false">
      <div class="bootMark">
        <strong>JOYFIT24</strong>
        <span>経堂</span>
        <i aria-hidden="true"></i>
      </div>
    </div>
    <section class="view active" id="authView">
      <div class="authHero">
        <div class="authInner" id="authInner">
          <div class="brandBlock">
            <p class="anniversary">9th Anniversary Challenge</p>
            <p class="store">JOYFIT24<br><span>経堂</span></p>
            <div class="authPulse" aria-hidden="true"></div>
          </div>

          <div class="promoBoard" aria-label="チャレンジ案内">
            <div class="promoCol">
              <small>RULE</small>
              <b>1週間で最大<br>3回チャレンジ！</b>
            </div>
            <div class="promoCol">
              <small>BONUS</small>
              <b>参加するほど<br><span>くじのチャンスUP！</span></b>
            </div>
          </div>

          <form class="loginBoard" id="loginForm">
            <label>
              ニックネーム
              <input name="nickname" autocomplete="nickname" maxlength="16" placeholder="例：タロウ" required>
            </label>
            <label>
              4桁パスワード
              <input name="pin" autocomplete="current-password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="例：1234" required>
            </label>
            <button class="primaryButton" type="submit" id="loginButton">ログイン</button>
            <div class="message" id="authMessage"></div>
          </form>
        </div>
      </div>
    </section>

    <section class="view appView" id="appView">
      <header class="shellHeader">
        <div class="headerTop">
          <div class="headerBrand">
            <span class="eyebrow">JOYFIT24 経堂</span>
            <b id="accountName">ゲスト</b>
          </div>
          <button class="logout" type="button" id="logoutButton">ログアウト</button>
        </div>

        <div class="eventBoard">
          <div class="eventMeta">
            <span id="weekNo">Week 1</span>
            <span id="accountMeta">会員</span>
          </div>
          <strong id="currentEvent">握力測定</strong>
          <div class="period" id="currentPeriod">8/3(月) - 8/9(日)</div>
        </div>
      </header>

      <nav class="tabs" aria-label="表示切替">
        <button class="tabButton active" type="button" data-tab="entryPanel">記録する</button>
        <button class="tabButton" type="button" data-tab="rankingPanel">ランキング</button>
      </nav>

      <section class="section active" id="entryPanel">
        <div class="entryBoard">
          <div class="scoreStage">
            <div class="guide">
              <b id="guideEvent">握力測定</b>
              <span class="unit" id="unitBadge">kg</span>
            </div>
          </div>

          <form class="formGrid" id="entryForm">
            <label>
              記録
              <input name="score" inputmode="decimal" placeholder="55.0" required>
            </label>
            <button class="primaryButton" type="submit">記録を送信する</button>
            <div class="message" id="entryMessage"></div>
          </form>
        </div>
      </section>

      <section class="section" id="rankingPanel">
        <div class="rankBoard">
          <div class="sectionHead">
            <h2>THIS WEEK</h2>
            <span id="unitLabel">合計 kg</span>
          </div>
          <ol class="ranking" id="rankingList"></ol>
        </div>

        <div class="rankBoard">
          <div class="sectionHead">
            <h2>PAST WEEKS</h2>
            <span>種目別</span>
          </div>
          <div class="weeks" id="weekChips"></div>
          <ol class="ranking" id="historyList"></ol>
        </div>
      </section>
    </section>

    <div class="loadingOverlay" id="loadingOverlay" aria-live="polite" aria-hidden="true">
      <div class="loadingPanel">
        <div class="loaderRing" aria-hidden="true"></div>
        <strong id="loadingTitle">処理中です</strong>
        <p id="loadingDetail">お待ちください。</p>
        <div class="progressTrack"><div class="progressBar" id="progressBar"></div></div>
        <div class="progressText" id="progressText">0%</div>
      </div>
    </div>
  </main>

  <script>
    const CONFIG = {
      gasEndpoint: "https://script.google.com/macros/s/AKfycbwHCmikLDfBN25bLcEkaLP6RlGyuf7Z6B64hGB0BJGcLQjxwiysATZ6qSdAZNl5h0m1RQ/exec",
      testWeekOverride: 1
    };

    const weeks = [
      { week: 1, event: "握力測定", unit: "kg", start: "2026-08-03", end: "2026-08-09", higherIsBetter: true },
      { week: 2, event: "前屈", unit: "cm", start: "2026-08-10", end: "2026-08-16", higherIsBetter: true },
      { week: 3, event: "プランク", unit: "秒", start: "2026-08-17", end: "2026-08-23", higherIsBetter: true },
      { week: 4, event: "腕立て伏せ", unit: "回", start: "2026-08-24", end: "2026-08-30", higherIsBetter: true }
    ];

    const state = {
      selectedWeek: getCurrentWeek().week,
      session: readSession(),
      records: [],
      rankings: {}
    };

    function getCurrentWeek() {
      if (CONFIG.testWeekOverride) {
        return weeks.find(w => w.week === CONFIG.testWeekOverride) || weeks[0];
      }
      const today = new Date();
      const active = weeks.find(w => today >= new Date(`${w.start}T00:00:00+09:00`) && today <= new Date(`${w.end}T23:59:59+09:00`));
      if (active) return active;
      if (today < new Date(`${weeks[0].start}T00:00:00+09:00`)) return weeks[0];
      return weeks[weeks.length - 1];
    }

    function formatPeriod(w) {
      const s = new Date(`${w.start}T00:00:00+09:00`);
      const e = new Date(`${w.end}T00:00:00+09:00`);
      const day = ["日", "月", "火", "水", "木", "金", "土"];
      return `${s.getMonth() + 1}/${s.getDate()}(${day[s.getDay()]}) - ${e.getMonth() + 1}/${e.getDate()}(${day[e.getDay()]})`;
    }

    function render() {
      const loggedIn = Boolean(state.session && state.session.token);
      document.getElementById("authView").classList.toggle("active", !loggedIn);
      document.getElementById("appView").classList.toggle("active", loggedIn);
      if (!loggedIn) return;

      const current = getCurrentWeek();
      document.getElementById("accountName").textContent = state.session.nickname || "ゲスト";
      document.getElementById("accountMeta").textContent = state.session.division === "staff" ? "スタッフ" : "会員";
      document.getElementById("weekNo").textContent = `WEEK ${current.week}`;
      document.getElementById("currentEvent").textContent = current.event;
      document.getElementById("currentPeriod").textContent = formatPeriod(current);
      document.getElementById("guideEvent").textContent = current.event;
      document.getElementById("unitBadge").textContent = current.unit;
      document.getElementById("unitLabel").textContent = `合計 ${current.unit}`;
      renderRanking("rankingList", current.week);
      renderWeekChips();
      renderRanking("historyList", state.selectedWeek);
    }

    function renderRanking(target, weekNo) {
      const list = document.getElementById(target);
      const w = weeks.find(item => item.week === weekNo);
      const rows = state.rankings[String(weekNo)] || [];
      list.innerHTML = "";
      if (!rows.length) {
        list.innerHTML = `<li class="rankItem"><div class="place">-</div><div class="name">まだ記録がありません<span class="sub">最初の記録をお待ちしています</span></div><div class="score">0 ${w.unit}</div></li>`;
        return;
      }
      rows.forEach(row => {
        const li = document.createElement("li");
        li.className = "rankItem";
        li.innerHTML = `
          <div class="place">${row.rank}</div>
          <div class="name">${escapeHtml(row.displayName)}${row.division === "staff" ? " STAFF" : ""}<span class="sub">${row.attempts}回記録</span></div>
          <div class="score">${formatScore(row.total)} ${w.unit}</div>
        `;
        list.appendChild(li);
      });
    }

    function renderWeekChips() {
      const box = document.getElementById("weekChips");
      box.innerHTML = "";
      weeks.forEach(w => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `weekChip ${w.week === state.selectedWeek ? "active" : ""}`;
        button.textContent = `W${w.week} ${w.event}`;
        button.addEventListener("click", () => {
          state.selectedWeek = w.week;
          render();
        });
        box.appendChild(button);
      });
    }

    async function loadData(options = {}) {
      const silent = Boolean(options.silent);
      try {
        const data = await api({ action: "list" });
        if (data.ok) {
          state.records = data.records || [];
          state.rankings = data.rankings || {};
        } else if (!silent) {
          showMessage("entryMessage", data.message || "データを取得できませんでした。", false);
        }
      } catch (error) {
        if (!silent) {
          showMessage("entryMessage", "データ取得に失敗しました。GASの公開設定かデプロイ更新を確認してください。", false);
        }
        throw error;
      } finally {
        render();
      }
    }

    async function login(nickname, pin) {
      const cleanNickname = String(nickname || "").trim().slice(0, 16);
      const cleanPin = String(pin || "").trim();
      if (!cleanNickname) return { ok: false, message: "ニックネームを入力してください。" };
      if (!/^[0-9]{4}$/.test(cleanPin)) return { ok: false, message: "4桁パスワードを入力してください。" };
      const expires = new Date(Date.now() + 1000 * 60 * 60 * 24 * 30).toISOString();
      state.session = {
        token: "local",
        participantId: "",
        nickname: cleanNickname,
        pin: cleanPin,
        division: "member",
        expiresAt: expires
      };
      localStorage.setItem("joyfitSession", JSON.stringify(state.session));
      return { ok: true, session: state.session };
    }

    async function submitRecord(payload) {
      const body = {
        ...payload,
        nickname: state.session.nickname,
        pin: state.session.pin
      };
      return api({ action: "submit", token: state.session.token || "", payload: JSON.stringify(body) });
    }

    function api(params) {
      return new Promise((resolve, reject) => {
        const callbackName = `joyfitCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const search = new URLSearchParams({ ...params, callback: callbackName });
        const timeoutId = window.setTimeout(() => {
          reject(new Error("request timeout"));
          script.remove();
          delete window[callbackName];
        }, 25000);
        window[callbackName] = data => {
          window.clearTimeout(timeoutId);
          resolve(data);
          script.remove();
          delete window[callbackName];
        };
        script.onerror = () => {
          window.clearTimeout(timeoutId);
          reject(new Error("request failed"));
          script.remove();
          delete window[callbackName];
        };
        script.src = `${CONFIG.gasEndpoint}?${search.toString()}`;
        document.body.appendChild(script);
      });
    }

    document.querySelectorAll(".tabButton").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tabButton").forEach(b => b.classList.toggle("active", b === button));
        document.querySelectorAll(".section").forEach(p => p.classList.toggle("active", p.id === button.dataset.tab));
      });
    });

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const button = document.getElementById("loginButton");
      showMessage("authMessage", "", true);
      button.disabled = true;
      setBusyLoading(true, {
        title: "ログイン中です",
        detail: "参加情報を確認しています。"
      });
      try {
        const data = await login(
          String(form.get("nickname") || "").trim(),
          String(form.get("pin") || "").trim()
        );
        if (!data.ok) {
          setBusyLoading(false);
          showMessage("authMessage", data.message || "ログインできませんでした。ニックネームと4桁パスワードを確認してください。", false);
          return;
        }

        render();
        setBusyLoading(true, {
          title: "読み込み中です",
          detail: `${getCurrentWeek().event}の画面を準備しています。`
        });
        event.currentTarget.reset();
        await loadData({ silent: true });
        await finishBusyLoading();
        showMessage("entryMessage", "ログインしました。記録を入力できます。", true);
      } catch (error) {
        setBusyLoading(false);
        if (state.session && state.session.token) {
          render();
          showMessage("entryMessage", "ログインはできました。通信が不安定なため、ランキングの再読み込みをお試しください。", false);
        } else {
          showMessage("authMessage", "ログイン情報を保存できませんでした。もう一度入力してください。", false);
        }
      } finally {
        button.disabled = false;
      }
    });

    document.getElementById("entryForm").addEventListener("submit", async event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const current = getCurrentWeek();
      const button = event.currentTarget.querySelector('button[type="submit"]');
      const payload = {
        week: current.week,
        event: current.event,
        score: Number(form.get("score")),
        unit: current.unit,
        inputBy: "self"
      };
      if (!Number.isFinite(payload.score)) {
        showMessage("entryMessage", "記録を数字で入力してください。", false);
        return;
      }

      button.disabled = true;
      setBusyLoading(true, {
        title: "記録を送信中です",
        detail: `${current.event}の記録を登録しています。`
      });
      try {
        const result = await submitRecord(payload);
        if (!result.ok) {
          setBusyLoading(false);
          showMessage("entryMessage", result.message || "送信できませんでした。", false);
          return;
        }
        setBusyLoading(true, {
          title: "反映しています",
          detail: "ランキングを更新しています。"
        });
        event.currentTarget.reset();
        await loadData({ silent: true });
        await finishBusyLoading();
        const attemptLabel = result.record && result.record.attempt
          ? `${result.record.attempt}回目の記録を登録しました。`
          : "送信完了。ランキングに反映しました。";
        showMessage("entryMessage", attemptLabel, true);
      } catch (error) {
        // GAS側は成功していることが多いので、再取得できたら成功扱いにする
        try {
          await loadData({ silent: true });
          await finishBusyLoading();
          showMessage("entryMessage", "記録を受け付けました。", true);
        } catch (_) {
          setBusyLoading(false);
          showMessage("entryMessage", "送信に失敗しました。もう一度お試しください。", false);
        }
      } finally {
        button.disabled = false;
      }
    });

    document.getElementById("logoutButton").addEventListener("click", () => {
      localStorage.removeItem("joyfitSession");
      state.session = null;
      render();
    });

    function readSession() {
      try { return JSON.parse(localStorage.getItem("joyfitSession") || "null"); }
      catch { return null; }
    }

    function showMessage(id, text, ok) {
      const el = document.getElementById(id);
      if (!text) {
        el.textContent = "";
        el.className = "message";
        return;
      }
      el.textContent = text;
      el.className = `message show ${ok ? "ok" : "err"}`;
    }

    let loadingTimer = null;
    let loadingPercent = 0;

    function setBusyLoading(active, copy = {}) {
      const overlay = document.getElementById("loadingOverlay");
      if (active) {
        if (copy.title) document.getElementById("loadingTitle").textContent = copy.title;
        if (copy.detail) document.getElementById("loadingDetail").textContent = copy.detail;
        const alreadyOpen = overlay.classList.contains("show");
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
        if (!alreadyOpen) {
          loadingPercent = 0;
          updateProgress(0);
        }
        window.clearInterval(loadingTimer);
        loadingTimer = window.setInterval(() => {
          const next = loadingPercent < 70 ? loadingPercent + 8 : loadingPercent + 2;
          updateProgress(Math.min(next, 92));
        }, 180);
        return;
      }
      window.clearInterval(loadingTimer);
      loadingTimer = null;
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
      updateProgress(0);
    }

    function finishBusyLoading() {
      return new Promise(resolve => {
        window.clearInterval(loadingTimer);
        updateProgress(100);
        window.setTimeout(() => {
          setBusyLoading(false);
          resolve();
        }, 280);
      });
    }

    function updateProgress(value) {
      loadingPercent = value;
      document.getElementById("progressBar").style.width = `${value}%`;
      document.getElementById("progressText").textContent = `${Math.round(value)}%`;
    }

    function formatScore(value) {
      return Number.isInteger(Number(value)) ? String(value) : Number(value).toFixed(1);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[s]));
    }

    function playBootSequence() {
      const overlay = document.getElementById("bootOverlay");
      const authInner = document.getElementById("authInner");
      window.setTimeout(() => {
        overlay.classList.add("is-done");
        overlay.setAttribute("aria-hidden", "true");
        if (authInner) authInner.classList.add("is-ready");
      }, 900);
    }

    render();
    playBootSequence();
    if (state.session) {
      loadData({ silent: true }).catch(() => {
        showMessage("entryMessage", "データ取得に失敗しました。通信状況を確認してください。", false);
      });
    }
  </script>
</body>
</html>
